<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <type>system</type>
  <!-- Private socket shared with other containers via the iotsound-dbus volume -->
  <listen>unix:path=/run/iotsound-dbus/socket</listen>
  <!-- Pull in avahi's own policy file so it can own org.freedesktop.Avahi -->
  <includedir>/etc/dbus-1/system.d</includedir>
  <!-- Permissive policy: this is a private pod-internal bus, not the host system bus -->
  <policy context="default">
    <allow user="*"/>
    <allow send_destination="*"/>
    <allow receive_sender="*"/>
    <allow own="*"/>
  </policy>
</busconfig>
