      body: >
        HLS stability:

        - Disable lowLatencyMode in hls.js (was too aggressive for Pi, caused
        stalls)

        - maxBufferLength=20, liveSyncDuration=4 — buffer more, stay 4s behind
        live edge

        - Stall detector: if video freezes 6s while playing, destroy and
        recreate hls instance

        - onStreamDown no longer immediately shows waiting screen; 4s grace
        period so
          same-singer 1s gaps show a frozen frame instead of a jarring waiting flash
        - startStream() guarded with if(hls||playing) to prevent duplicate
        instances

        - HLS segments: hls_time 2, hls_list_size 5 — more headroom for Pi
        encoding


        Next Up fix:

