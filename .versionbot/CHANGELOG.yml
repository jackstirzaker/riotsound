      author: JaragonCR
    - subject: "feat(multiroom-2): role system + WirePlumber play-detect spike"
      hash: dd599f32162ac5ae710d797464185803d8d9545b
      body: >
        Replaces SOUND_MODE / SoundModes with SOUND_MULTIROOM_ROLE /
        MultiroomRole

        (auto | host | join | disabled). Zero-downtime migration: if SOUND_MODE
        is

        set and SOUND_MULTIROOM_ROLE is not, the old value is mapped and a
        deprecation

        warning is logged.


        Role-based service management:

        - auto/host: start all plugins + both multiroom containers

        - join: stop plugins (airplay/librespot/bluetooth), snapclient only

        - disabled: stop multiroom containers, start all plugins (standalone)


        New API surface:

        - GET  /multiroom        — role, group, device IP, latency config

        - POST /multiroom/role   — change role, persists SOUND_MULTIROOM_ROLE to
        device

        - POST /multiroom/group  — change group name, persists SOUND_GROUP_NAME

