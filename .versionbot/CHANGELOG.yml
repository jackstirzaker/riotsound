          must always be running, were implicitly relying on balenaOS default)
        - librespot: unless-stopped → on-failure (sound-supervisor manages
          start/stop; unless-stopped fights mode switching by restarting a
          container that was intentionally stopped via the supervisor API)

        Design rule: unless-stopped for core infrastructure that owns itself;
        on-failure for plugins owned by sound-supervisor (clean stop = stay
        stopped until sound-supervisor says otherwise).

