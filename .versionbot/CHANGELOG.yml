    - subject: "fix(mdns): stop discovery on master to prevent advertiser interference"
      hash: 90fd19fd3f01ca99c629b526e472cd2c9c7ef82d
      body: |
        Two Bonjour instances both bound to 0.0.0.0:5353 on the same host
        interfere with each other: the browser socket can steal incoming mDNS
        queries before the advertiser sees them, causing the advertiser to
        never respond to client devices.

        Masters don't need to browse — they know their own IP. Only client
        devices run the discovery interval. On role transition to master the
        discovery interval is stopped; on demotion back to client it is started.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(mdns): remove interface binding from mDNS browser"
      hash: 2cb0353d383e1c080b91fad5612f7d89789d06bd
      body: |
        Binding the browser socket to the LAN unicast IP prevents it from
        receiving multicast responses on Linux — a socket bound to
        172.28.10.185 only receives packets destined for that address, not
        packets destined for 224.0.0.251. This silently broke discovery on
        client devices: queries went out but responses were never collected.

        Same root cause as the advertiser fix (b4d87c6). Since all containers
        use network_mode: host, the kernel routes outgoing mDNS queries to the
        correct NIC without interface binding.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(mdns): unbind advertiser from specific interface"
      hash: 992dc6aeb7d3e200f78749f2efcdebe0f1e5615f
      body: |
        The interface option on the advertiser socket prevented it from
        receiving incoming queries and responding. Browser still uses the
        interface binding to query on the correct LAN NIC; advertiser binds
        to 0.0.0.0 so it can respond to queries from any interface.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
