    - subject: "fix(audio): replace WirePlumber play-detect with pactl subscribe
        watcher"
      hash: 0314b3e307a56de2b50651f2ed890a43556d175d
      body: >
        WirePlumber Lua link events for module-null-sink nodes are not exposed

        to the ObjectManager — pipewire-pulse manages those links internally.

        Neither node.target nor link objects fire for the balena-sound.input
        sink.


        Replace with a background pactl subscribe watcher in start.sh that fires

        after PulseAudio is fully ready. On each sink-input event, checks
        whether

        any sink-input is currently connected to balena-sound.input
        (state-based,

        not event-based) to avoid duplicate calls. Posts to /internal/play or

        /internal/stop accordingly.


        The WirePlumber Lua file is kept as a documented no-op stub so the conf

        file and script loader remain intact.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "debug(audio): log all WirePlumber links to identify node names"
