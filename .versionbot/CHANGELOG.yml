    - subject: "feat: v5.0 — Multiroom 2.0, Karaoke, and platform hardening"
      hash: 844f6d0c884fbb733212514b3ba5d0aa6f03372c
      body: >
        Multiroom 2.0:

        - mDNS/Bonjour discovery replaces cote event broadcast

        - Dynamic master election with 30s demotion on stream stop

        - Role-aware snapclient latency: 150ms master, 400ms remote client

        - Pre-warmed containers for <500ms first-play latency

        - SOUND_MULTIROOM_MASTER override for managed/VLAN networks

        - Universal debug switch: LOG_LEVEL=debug enables all services +
        support-toolkit


        Karaoke:

        - New karaoke plugin with Go audience/singer UI

        - Direct MP4 browser playback, local speaker mode, mic loopback

        - Queue management, singer view, history dedup, QR code join

        - Python/Waitress fetcher sidecar with daily yt-dlp updates


        Platform hardening:

        - Supervisor 423 lock retry on all service start/stop calls

        - Network readiness wait in librespot before mDNS bind

        - PulseAudio indefinite retry in sound-supervisor

        - snapclient exit code propagation and PA readiness polling
      footer:
        Change-type: major
        change-type: major
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
