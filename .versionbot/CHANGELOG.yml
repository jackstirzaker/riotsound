- commits:
    - subject: "fix(sound-supervisor): replace hardcoded sink indexes in setMode()"
      hash: 74283e273efe2efa7c0c149210ba31789b49c223
      body: |
        moveSinkInput(0, 2) and moveSinkInput(0, 3) assumed fixed PulseAudio
        indexes that break when USB or DAC cards alter sink numbering.
        Now resolved by name via moveSinkInputByName(). Also fixes String
        object wrapper type in MultiRoomConfig interface.
      footer:
        Change-type: patch
        change-type: patch
      author: JaragonCR
    - subject: "fix(sound-supervisor): add name-based sink lookup to PulseAudioWrapper"
      hash: 81df90525b1586e3c77225263901140cfe8a5fc0
      body: |
        Add getSinkIndexByName(), getSinkInputIndexBySource(), and
        moveSinkInputByName() so callers can address sinks by their stable
        names rather than dynamic indexes that shift when USB/DAC cards are
        present.
      footer:
        Change-type: patch
        change-type: patch
      author: JaragonCR
    - subject: "fix(sound-supervisor): consolidate balena SDK into single BalenaClient"
      hash: 4bf93d981820bf3c35d2985acd22d962472218e0
      body: >
        Both index.ts and SoundAPI.ts were independently calling getSdk() and

        loginWithToken(), creating two separate authenticated SDK instances.

        BalenaClient.ts now owns the single instance; both callers import from
        it.

        Also fixes error.message on unknown catch binding in index.ts.
      footer:
        Change-type: patch
        change-type: patch
      author: JaragonCR
    - subject: "fix(sound-supervisor): remove orphaned dependencies"
      hash: 8dd3890392e4a2438e0bc69c045ca3d854052106
      body: |
        @tmigone/pulseaudio was replaced by PulseAudioWrapper.ts and is no
        longer imported. ts-retry-promise is not imported anywhere in src/.
      footer:
        Change-type: patch
        change-type: patch
      author: JaragonCR
    - subject: "fix(balena): add raspberrypi5 to supportedDeviceTypes"
      hash: e15e601058328c94d79932b6fc2610982aa05295
      body: |
        Pi 5 was missing from the supported device list, preventing deployment
        from balenaHub. Stack is architecture-agnostic so Pi 5 works as-is.
      footer:
