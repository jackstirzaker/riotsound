    - subject: "fix(multiroom): use explicit PCM definitions with server/device in
        asound.conf"
      hash: cc7c5accc9cd04951e666d7190a8ee0ba7d698e4
      body: |
        ALSA-Pulse plugin env vars (PULSE_SERVER/PULSE_SOURCE) were not being
        honoured reliably. Write full PCM definitions in asound.conf at startup
        with the dynamic gateway IP and explicit device names:
        - snapmonitor PCM for snapserver capture from snapcast.monitor
