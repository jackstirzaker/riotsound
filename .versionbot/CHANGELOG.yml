      hash: 6fdc2704a1c7b37302207548df4755f298d589e6
      body: >
        PipeWire defaults to 48000 Hz; snapserver was requesting 44100 Hz
        capture

        from the ALSA-Pulse plugin, causing 'Invalid argument' when negotiating

