    - subject: "fix(sound-supervisor): replace deprecated npm install --production"
      hash: 5717cd362fac40decbaafa50f78c0229c4509442
      body: |
        --production was deprecated in npm v9. Use --omit=dev instead.
      footer:
        Change-type: patch
