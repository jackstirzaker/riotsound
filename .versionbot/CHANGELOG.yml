    - subject: "fix(multiroom-server): capture via pacat FIFO instead of ALSA-Pulse"
      hash: efb02263acbf8350c8eb10294d6de26f2d5c4c3b
      body: >
        The ALSA-Pulse plugin for monitor source capture doesn't work with

        pipewire-pulse. Replace with pacat piped to a local FIFO:

        - pacat --record --device=snapcast.monitor captures raw s16le 48000
        stereo

        - snapserver reads from /tmp/snapserver-audio FIFO via pipe:// stream

        - Add pulseaudio-utils to runtime for pacat binary
      footer:
