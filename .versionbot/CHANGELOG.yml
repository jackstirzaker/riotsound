- commits:
    - subject: "fix(versionist): scan commit body for Change-type as footer fallback"
      hash: 8c500a94a4fce7f16cb87cd430266b0f271bee49
      body: |
        git only parses the last paragraph as trailers. A blank line before
        Co-Authored-By puts Change-type in a different paragraph, so it never
        lands in commit.footer. Add a regex scan of commit.body so Change-type
        is found regardless of where in the message it appears.
      footer:
