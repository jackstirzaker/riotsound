    - subject: "docs: note WPA3/PMF multicast issue on Pi 3 BCM43438"
      hash: 8ffe850c0ae98454a45f5ed8a467d5d16dcd2aed
      body: |
        Older Broadcom chips can mishandle multicast under WPA3/PMF on 2.4GHz,
        causing mDNS failures and audio cuts. Added workaround: use WPA2-only
        with PMF disabled for Pi 3 clients.
      footer:
