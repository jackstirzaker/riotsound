    - subject: "fix(sound-supervisor): retry safeService on 423 supervisor lock"
      hash: fabf914546e2e17fe1c279b7f82005dbfe4d9a91
      body: |
        When the balena supervisor is locked (e.g. during a concurrent service
        bounce), service start/stop calls return 423. Previously these were
        silently dropped, leaving snapserver or multiroom-client in the wrong
        state. Now retries up to 3 times at 2s/4s/6s intervals.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
