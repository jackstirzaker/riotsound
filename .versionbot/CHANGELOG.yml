        Previous condition (d.state==='playing') was too strict — playerState is
        set

        just before play() starts but handleAPIData derives now_playing from DB
        status,

        creating a window where they diverge. Use d.now_playing instead: if a
        song is

        in the DB as playing and there's a next song queued, show the Next Up
        box.
