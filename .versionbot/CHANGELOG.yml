    - subject: "fix(multiroom): configure ALSA pulse PCM so snapcast uses PulseAudio"
      hash: 41aa11531b385334f33bbdaa595e8e4085d39784
      body: >
        snapclient/snapserver use ALSA output/input. In a container without

        hardware ALSA devices, 'default' PCM doesn't exist. Write
