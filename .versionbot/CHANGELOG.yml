    - subject: "fix(librespot): quote all string values in generated YAML config"
      hash: 689f194930d7209d9f92060c6152fa987c87b4cd
      body: |
        Unquoted env vars in the heredoc allowed values containing ':' or
        newlines to corrupt the config file. Quoted all user-facing string
        fields; numeric and boolean fields left unquoted as YAML requires.
      footer:
