    - subject: "fix(multiroom): bind mDNS multicast to LAN interface"
      hash: cef75c44b26c3ae3965ab75928f96a40ad19fce9
      body: |
        Devices with multiple network interfaces (Docker bridges, resin-vpn,
        supervisor0) caused bonjour-service to bind the multicast socket to a
        non-LAN interface, silently failing cross-device discovery. Passing the
        detected LAN IP (wlan/eth) via the multicast-dns `interface` option
        pins the socket to the correct NIC for both advertising and browsing.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(multiroom-client): wait indefinitely for snapcast target"
      hash: d7f718d756d45aaa81418c66cf9a2529ba1a79fa
      body: |
        Removing the 60s client-ready timeout that was causing on-failure
        restarts every minute when no master was present. The container should
        wait until a master is promoted or discovered — the supervisor-side
        rerouteInputDirect() fallback already handles the case where audio
        is playing but Snapcast is broken. Log a heartbeat every 30s instead.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
