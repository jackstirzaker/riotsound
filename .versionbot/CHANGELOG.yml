    - subject: "fix(karaoke): force 2s GOP so hls_time 2 produces 2s segments"
      hash: ee4f96c05df2c7e64ca49eec5c77fa1b700cb460
      body: |
        Without -g 48/-keyint_min 48, ffmpeg used the source video's native
        keyframe interval (~8s for karaoke videos), making segments 8 seconds
        long despite hls_time 2. hls.js then stalled 8s waiting for each new
        segment. Using fixed GOP flags is cheaper than force_key_frames expr.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(karaoke): HLS always-on with audio; mode change only toggles
        speakers"
      hash: baff5a466cca3759f47b750b6cb5811c2576cbbb
      body: |
        HLS now runs for the full song duration with audio always included.
        Switching between Speakers/Stream no longer restarts ffmpeg — it only
        starts or stops the PipeWire process. Clients join the single persistent
        stream and seek to play_position_ms on connect.

        Also: drop video bitrate 1500k→1000k (less Pi CPU); clean up hls.js
        config (remove live-sync overrides that were causing stall/reconnect).
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(karaoke): volume slider controls video.volume in stream mode"
      hash: 553aba80fb86eac44bd80074c26f4018f5e8610d
      body: |
        In stream mode audio comes from the browser's HLS video element, not
        PipeWire/Snapcast. The slider now sets video.volume directly instead
        of proxying to sound-supervisor (which was hitting the wrong group).
        Switching modes refreshes the slider to match the new audio source.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(karaoke): fix nil panic, stale mode-change restart, and CPU
        overhead"
      hash: 1647a925769dff076abf088d070a9ca590368bd3
      body: |
        Three bugs fixed:
        - Nil pointer panic: goroutine in play() captured hlsCmd/playerCmd
          globals which were set to nil by the mode-change handler before
          Wait() returned. Fix: snapshot cmd pointers into locals at start
          of each loop iteration.
        - Stale mode-change signal: modeChangeCh had a buffered signal from
          a previous song, causing every new song to immediately restart its
          ffmpeg processes. Fix: drain the channel at the top of play().
        - CPU: remove force_key_frames expression (expensive on Pi); skip
          rubberband filter when semitones=0 (passthrough is free).
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(karaoke): fix HLS out-of-order with EVENT playlist + position seek"
      hash: 6a566a7c6b5143fe69ee32c1948baf16d43da676
      body: |
        Switch from rolling live-HLS to EVENT-playlist HLS so all segments are
        kept from seg0. Add play_position_ms to /api/data so the singer view
        seeks to the current song position on connect instead of chasing a live
        edge. Force keyframes every 2s for clean IDR segment boundaries.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(karaoke): client-side dedup history by yt_id"
      hash: f2326a2efdceb0d023ae12b10fb1c015e8253155
      body: |
        Belt-and-suspenders guard on top of the GROUP BY yt_id backend fix;
        also fixes the render-diff key (was using play_count which isn't
        returned by the history query).
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(karaoke): add -re to HLS ffmpeg, deduplicate history by yt_id"
      hash: d264a333107134e088ce45f306c8dfb4bbbabc82
      body: |
        Without -re, ffmpeg processed a full video file in seconds; in stream
        mode the player finished immediately and raced into the next song,
        causing two songs to appear simultaneously. -re reads at native rate.

        History "all" and "most" queries now GROUP BY yt_id so the same song
        sung by different singers doesn't appear multiple times in the feed.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(karaoke): drop append_list, clean HLS dir per-song, fix stream
        pitch shift"
      hash: e6dd69cef15cd915c838b0a68a8464cac1c19257
      body: >
        The out-of-order/skipping artifacts were caused by -hls_flags
        append_list:

        each new song's ffmpeg appended to the old playlist, but old segments
        were

        already deleted by delete_segments. hls.js chased 404s and played
        whatever

        it found, producing random frame order. Fix:

        - Remove append_list; each song gets a fresh playlist

        - cleanHLS() deletes all *.ts + playlist.m3u8 before each song starts

        - hls_list_size raised to 6 (12s of buffer)


        Also fix stream mode pitch shift: buildHLSArgs now takes pitch float64
        and

        applies rubberband=pitch=X to the HLS audio (previously only
        local/PipeWire

        path had pitch shifting, so stream mode played at original pitch
        regardless

        of key offset).
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
