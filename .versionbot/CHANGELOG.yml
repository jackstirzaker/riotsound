    - subject: "fix(watchdog): switch to balenalib base image, drop unused packages"
      hash: df825f80f99aacfb77497f51482a16ec71354121
      body: |
        Replace generic python:3.11-slim with balenalib Debian Python for
        proper ARM/udev support. Remove pulseaudio-utils (unused) and the
