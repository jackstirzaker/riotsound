    - subject: "fix(hostname): reboot after apply, suppress repeated match logs"
      hash: c37046b2ff5d070c789d0baf7a156add42c98e01
      body: >
        - Reboot via supervisor API after patching hostname so the change takes
          effect (host-config hostname changes require a reboot).
        - Log the "already set" message only once per container lifetime using a
          shell flag; subsequent 60s poll cycles are silent when nothing changed.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(hostname): read host-config API to detect current hostname"
      hash: a39cd475f620c7763d35b055309e8024ade2bfae
      body: >
        `hostname` inside a container returns the container's short ID, not the

        host OS hostname. Compare against the supervisor host-config GET
        endpoint

        instead, which reflects the actual applied value. Guard against API

        failures by skipping the PATCH when the response is empty, so a
        transient

        supervisor outage can't trigger a hostname change and device reboot.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(hostname): read host-config API instead of hostname command"
      hash: f872c44f45d4684a85159a108f1d58d846aa6846
      body: |
        `hostname` inside a balena container returns the container's hostname
        (a UUID fragment), not the host OS hostname. Comparing it against
        SOUND_DEVICE_NAME always fails, causing a PATCH on every poll interval.
        Read the current hostname from the supervisor host-config GET endpoint
        instead, which returns the actual host-level value.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(multiroom): host networking, fallback routing, snapclient pulse
        build"
      hash: 0e0c852b96884bbc09f26ba3374f1ad896089a6a
      body: >
        - Switch multiroom-server and multiroom-client to network_mode:host so
          snapclient has a direct route to snapserver (TCP 1704) and mDNS
          advertisement uses the real LAN IP. Removes the bridge hairpin failure.
        - Add pkg-config to snapclient builder so CMake pkg_check_modules finds
          libpulse; add -DBUILD_WITH_PULSE=ON explicitly. Fixes the missing
          --player pulse support that caused "No audio player support for: pulse".
        - Move PulseAudio connect to background in sound-supervisor init so
          /internal/play handlers and SnapserverMonitor are ready before Pulse
          is up. Remove the 20-retry cap in PulseAudioWrapper so it never gives up.
        - Add 20s multiroom fallback: if no snapclient connects after promotion,
          reroute balena-sound.input directly to balena-sound.output via pactl
          so audio is never silent when Snapcast is broken. Restore on demotion.
        - Add SOUND_MULTIROOM_CLIENT_TIMEOUT (default 60s) to multiroom-client
          so the client-ready wait exits for on-failure restart instead of blocking.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
