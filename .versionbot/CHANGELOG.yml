        multiroom-client"
      hash: 0360b7da2468166d2c871485cb738a05e5878ac5
      body: |
        - Dockerfile: add pulseaudio-utils so pactl is available (was missing,
          causing the pactl info check to loop forever with exit 127)
        - start.sh: poll every 5s instead of 2s; log only on first wait and
          every 30s after — quiet during normal startup, not silent on stuck
