        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(audio): switch play-detect to link-based WirePlumber events"
      hash: 65024666b3331cf6e4fefb73efb217bc08157505
      body: |
        node.target / target.object are not set when a plugin routes via the
        default PulseAudio sink (go-librespot, shairport-sync). Watching Stream
        node appearance therefore never fired /internal/play.

        Switch to monitoring Link objects: when a link forms between any output
        stream and balena-sound.input, fire /internal/play; when the last link
        from that source is removed, fire /internal/stop. Stereo streams create
        two links (L+R) — source_link_count deduplicates so only one HTTP call
        fires per stream.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "feat(multiroom-2): lazy AUTO election + 30s stop demotion"
      hash: d5739a6e1ce73eaa7a2c226530036deb2b1d23a3
      body: >
        AUTO devices no longer elect at boot — they start as unelected clients

        and promote to master only when /internal/play fires. This prevents idle

        devices from claiming master unnecessarily.


        On /internal/stop (stream unlink), a 30s demotion timer starts. If no

        play arrives before it fires, the master demotes back to unelected
        client

        (multiroom-server stops, advertisement withdrawn). A new play event on

        any device then re-elects a master from scratch.


        WirePlumber Lua now fires both /internal/play (stream-added) and

        /internal/stop (stream-removed). Also drops the debug all_nodes_om

        block that was logging every PipeWire node at startup.
      footer:
        Change-type: minor
        change-type: minor
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
