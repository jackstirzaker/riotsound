      author: JaragonCR
    - subject: "fix(startup): replace /dev/tcp check with pactl info in
        multiroom-client"
      hash: 362639df8b8d4fa896f2dca39a48295d4126220d
      body: |
        /dev/tcp only confirms the port is open, which passes on stale sockets
        from a dying previous pipewire-pulse session. pactl info speaks the PA
        protocol so it only succeeds once pipewire-pulse is fully initialised.

        Without this, snapclient crashes 5+ times on every restart cycle
        (PulseAudio context failed, error: Connection terminated) before PA
        finally settles, making latency appear erratic during startup.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(logs): remove noisy mdns-browse poll log"
      hash: e8818348163eeeda489af12d3463f992fc2c0306
      body: |
        browseSnapcast() fired every 15s and always logged "Found N snapcast
        service(s)" — that's ~240 lines/hour of noise. The meaningful event
        (master IP change) is already logged in SnapserverMonitor.discover().
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(latency): reduce audio pipeline delay from ~3s to ~650ms"
      hash: 49fa39a35813a3fc4f5ef904e210c1b6975ea72e
      body: |
        Hardware quantum confirmed 1024 samples (21ms), so we can safely tighten
        latency targets throughout the chain.

        - core/audio: default loopbacks 200ms → 100ms (saves 200ms total;
          100ms is well above the 21ms quantum so no underruns)
        - multiroom-client: set PULSE_LATENCY_MSEC=200 on snapclient invocation
          so libpulse requests a bounded output buffer instead of the PA server
          default (~1-2s); this is the main contributor to the 3s delay

        Estimated pipeline: 100ms input + 50ms pacat + 400ms snapserver +
        200ms snapclient PA + 100ms output ≈ 850ms total (vs ~3s before).
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(resilience): add PA readiness wait and restart guards to librespot
        and multiroom-server"
      hash: f098b2f1ea74b288aeb823a978d939daffe2c4d1
      body: |
        - librespot/start.sh: shebang → bash (needed for /dev/tcp), add
          /dev/tcp wait on localhost:4317 before starting the daemon, default
          backend → pulseaudio so go-librespot routes through pipewire-pulse
          instead of attempting exclusive raw-ALSA access.
        - multiroom-server/start.sh: add 120s timeout to start_pacat() so the
          container exits (triggering on-failure restart) if snapcast.monitor
          never becomes available, rather than hanging indefinitely.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "revert(multiroom-client): remove PULSE_LATENCY_MSEC=50 from snapclient"
      hash: 21c7d4e8cc1714602a92b67086ce6bafa0bc6d26
      body: >
        Without the PipeWire quantum cap, the hardware's native ALSA period

        (likely 341ms+ for HDMI on this Pi) exceeds 50ms. PipeWire rejects the

        PA stream when the requested latency is smaller than one quantum,
        causing

        snapclient to produce no audio.


        The quantum cap + PULSE_LATENCY_MSEC combination worked but broke plugin

        controls. Neither can be safely used alone. Reverting both to restore
        the

        known-good baseline (audio works, 3s delay).


        Latency reduction requires reading the actual hardware quantum from
        device

        logs first to know the safe floor.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(audio): remove PipeWire quantum cap — breaks plugin controls"
      hash: de0c296329abb1a6fe99cb969817017f28dc7263
      body: |
        The max-quantum=8192 cap conflicted with the ALSA hardware's preferred
        period on this device, destabilizing PipeWire. With PipeWire unstable,
        all plugin containers (librespot, airplay, bluetooth) lose their PA
        connections, drop into crash-restart loops, and stop responding to
        Spotify Connect / AirPlay / volume commands.

        PULSE_LATENCY_MSEC=50 on snapclient (multiroom-client) is kept — it
        reduces snapclient's libpulse output buffer without affecting PipeWire's
        graph scheduling, and does not impact plugin control paths.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(audio): cap PipeWire quantum and snapclient output buffer at
        runtime"
      hash: e5f570af4dcfbf7bc20d17b3b34795444a3df00e
      body: >
        Two likely sources of the 3s pipeline delay:


        1. PipeWire quantum: if the ALSA hardware driver negotiates a large
        period
           (e.g. 32768 samples = 680ms on some Pi HDMI configs), every node in the
           graph — including the loopback and pacat — inherits that period as its
           minimum chunk size. Write pipewire.conf.d/10-quantum.conf at startup to
           cap max-quantum at 8192 samples (170ms). The 200ms loopbacks are safely
           above this cap so no underruns. Written from start.sh, not baked into
           the Dockerfile, so it's always fresh on restart.

        2. snapclient output buffer: without PULSE_LATENCY_MSEC, libpulse asks
           PipeWire for its default playback buffer which can be ~2s. Setting
           PULSE_LATENCY_MSEC=50 cuts this to 50ms — the single biggest win if
           snapclient's PA stream is the bottleneck.

        Expected steady-state latency after this fix: ~550ms

        (200ms in-loopback + 50ms pacat + 50ms snapserver + 50ms snapclient +
        200ms out-loopback)
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "revert(audio): restore loopback latencies and remove quantum cap"
      hash: d4211fc01d7edede5d03d75242c3e8c8d96a12af
      body: |
        The 50ms loopback latency caused silence: if PipeWire's actual hardware
        quantum exceeds 50ms, the loopback ring buffer becomes smaller than one
        quantum and the module produces no output.

        The pipewire.conf.d drop-in approach also carries risk of crashing
        PipeWire if Alpine's package doesn't support drop-in loading.

        Restoring SOUND_INPUT_LATENCY and SOUND_OUTPUT_LATENCY to 200ms default.
        The CACHE_BUST is bumped to force a clean audio container rebuild.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(audio): cap PipeWire quantum and reduce loopback latency"
      hash: 4723306eb5f8994974ed9a9e42bd16fa0f185778
      body: >
        Add /etc/pipewire/pipewire.conf.d/10-quantum.conf to force PipeWire to

        run the audio graph at a 1024-sample (21ms) quantum with a max of 8192

        samples (170ms). Without this cap, PipeWire matches the ALSA hardware's

        native period size which on some Pi 4 configurations can be 32768
        samples

        (683ms), cascading through two loopbacks and pacat to produce 3s+
        pipeline

        delay.


        Reduce SOUND_INPUT_LATENCY and SOUND_OUTPUT_LATENCY defaults from 200ms

        to 50ms. With the quantum now bounded at 21ms, the loopback ring buffers

        only need 50ms to be stable. Total pipeline delay drops from 3s+ to

        roughly 250ms (50ms in + 50ms pacat + 50ms snapserver + 50ms snapclient
        +

        50ms out).
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(multiroom-client): use /dev/tcp PA readiness check (pactl not
        installed)"
      hash: 7535730ec7e23b4abd0e5ff759f702ac6b20a779
      body: >
        pactl is not available in the multiroom-client image — no
        pulseaudio-utils.

        Switch to bash's built-in /dev/tcp test which requires no extra
        packages.

        Same effect: blocks until pipewire-pulse is accepting TCP connections on
        4317.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(multiroom): wait for PulseAudio ready + pacat watchdog"
      hash: 87b7013daac8073a1e66f971722cf9226e6d8dca
      body: >
        Two startup race conditions:

        1. multiroom-server started pacat before audio container had loaded the
           snapcast sink module — pacat exited, snapserver got FIFO EOF and ran
           silently forever (no restart triggered). Fix: poll pactl until
           snapcast.monitor appears before starting pacat.
        2. multiroom-client launched snapclient before pipewire-pulse TCP was
           ready — PulseAudio context failed loop. Fix: poll pactl stat first.

        Also adds a pacat watchdog: holds the FIFO write-end open (exec 3>$FIFO)

        so snapserver never sees EOF between pacat restarts, and loops to
        restart

        pacat if it exits without snapserver needing to restart.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(multiroom): replace avahi CLI with bonjour-service pure-Node mDNS"
      hash: 30ae0cee91351649592d516ef20384ef5bc7984f
      body: |
        avahi-daemon is not present on balenaOS hosts — avahi-publish-service
        failed with "Daemon not running". Switch to bonjour-service (wraps
        multicast-dns, no daemon required): advertisement and discovery now
        run entirely in-process.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "feat(multiroom): Avahi advertisement + mDNS discovery + group volume
        sync (Spike-2+3)"
      hash: f1c7021659fe411b000047c79c3208df1fceb698
      body: >
        Avahi advertisement (Spike-2):

        - AvahiAdvertiser.ts spawns avahi-publish-service when snapserver first
          comes up, unpublishes when it goes down. No D-Bus library — uses
          system avahi-utils CLI (reliable on aarch64).
        - Advertises _snapcast._tcp with TXT: group, group_latency, hw_latency,
          role=host, version=2.0, master_uuid.
        - io.balena.features.dbus: "1" added to sound-supervisor so it can reach
          the host Avahi daemon. avahi-utils added to Dockerfile.

        mDNS discovery (Spike-3):

        - AvahiBrowser.ts runs avahi-browse -rpt --terminate every 15s and
          parses resolved _snapcast._tcp entries.
        - SnapserverMonitor caches the discovered master IP (filtered by
          SOUND_GROUP_NAME). GET /multiroom/master returns discovered IP or
          falls back to own IP — multiroom-client auto-connects to the right host.

        Group volume sync (in scope with Spike-2):

        - POST /audio/volume now also calls snapcast JSON-RPC Group.SetVolume
          so all connected remote clients change volume together.
        - Group ID cached from Server.GetStatus poll; volume call is
        fire-and-forget.
      footer:
        Change-type: minor
        change-type: minor
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(multiroom): set pacat capture latency to 50ms"
      hash: c6aa0114477bca3e4eca8e8c00e156f268a0b612
      body: |
        Without --latency-msec, PipeWire-pulse buffers 2-3 seconds of audio
        before flushing to pacat. This dominates the perceived command delay
        (pause, skip, volume) regardless of the snapserver bufferMs setting.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "feat(multiroom): dynamic snapcast buffer based on connected clients"
      hash: 202dcc1366deb42b4fc17c1dafda95d0447c020c
      body: |
        SnapserverMonitor polls snapserver's JSON-RPC every 5s and tracks how
        many remote snapclients are connected (total minus the always-present
        local client). On 0→1: restarts multiroom-server with the configured
        multi-room buffer (default 400ms, set via SOUND_MULTIROOM_BUFFER_MS or
        the UI slider). On last client leaving: restarts with 50ms standalone
        buffer. A 20s cooldown after each restart prevents thrash while
        clients reconnect.

        The 1→many transition requires no restart — buffer is already correct.

        start.sh now fetches the effective buffer from GET /multiroom/buffer
        and writes a dynamic snapserver.conf at startup. snapserver.conf loses
        its [stream] section (now runtime-generated). UI adds a buffer card
        with a live status badge and a 100–1000ms slider that persists
        SOUND_MULTIROOM_BUFFER_MS as a device env var.
      footer:
        Change-type: minor
        change-type: minor
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(multiroom): reduce snapcast latency to 400ms with PCM codec"
      hash: f58a5d0c54e9df61a469b419738edf6c840e05d2
      body: |
        Switch from FLAC (85ms frame delay) to PCM codec and lower bufferMs
        from the 1000ms default to 400ms. This reduces the delay between
        Spotify commands (pause, skip, volume) and audible effect by ~700ms.
        When adding real multi-room clients, SOUND_MULTIROOM_LATENCY can be
        used to compensate for per-speaker differences.
      footer:
        Change-type: patch
        change-type: patch
        Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
        co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
      author: JaragonCR
    - subject: "fix(multiroom-client): use --player pulse to bypass ALSA entirely"
      hash: 4aa5579993621a5a822ca67aefacb360d0dd4250
      body: |
        snapclient was built with libpulse-dev so it has a native PulseAudio
        player. Use --player pulse with PULSE_SERVER=tcp:<gw>:4317 to connect
        directly to pipewire-pulse, bypassing ALSA's 'default' PCM which doesn't
        exist in the container. PULSE_SINK=balena-sound.output (Dockerfile ENV)
        routes output to the correct PipeWire sink.
